sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of a Postgres application database
    config:
      freshness:
        warn_after:
          count: 6
          period: hour
        error_after:
          count: 10
          period: day
      loaded_at_field: _etl_loaded_at
    tables:
      - name: orders
        description: Raw orders data
        columns:
          - name: id
            description: PK for order data
            data_tests:
              - unique
              - not_null
      - name: customers
        description: Raw customer data
        columns:
          - name: id
            description: PK for customer data
            data_tests:
              - unique
              - not_null